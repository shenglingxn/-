<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>校园二手</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏫</text></svg>">
<style>
:root{--rose:#E8A69B;--rose-dark:#C48378;--rose-light:#FDF0ED;--cream:#FFFCF9;--ivory:#F9F4F0;--charcoal:#2C2422;--muted:#9E928E;--border:#EDE4E0;--card:#FFF;--success:#8BBF9E;--success-bg:#F0F7F2;--error:#D4827A;--error-bg:#FDF0EE;--gold:#D4A76A;--gold-bg:#FBF5EC;--radius:20px;--radius-sm:12px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;background:var(--cream);color:var(--charcoal)}
.page{display:none;min-height:100vh;padding-bottom:80px}
.page.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.page-header{padding:20px 20px 12px;display:flex;align-items:center;justify-content:space-between;background:var(--card)}
.page-header h1{font-size:20px;font-weight:700}
.search-box{margin:0 20px 12px;position:relative}
.search-box input{width:100%;padding:12px 16px 12px 44px;border:1.5px solid var(--border);border-radius:14px;font-size:15px;outline:none;background:var(--card);transition:.2s}
.search-box input:focus{border-color:var(--rose);box-shadow:0 0 0 3px rgba(232,166,155,0.1)}
.search-box .si{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--muted)}
.search-box .sb{position:absolute;right:5px;top:50%;transform:translateY(-50%);padding:8px 16px;border:none;border-radius:10px;background:var(--charcoal);color:#fff;font-size:13px;font-weight:600;cursor:pointer}
.categories{display:flex;gap:6px;padding:4px 20px 12px;overflow-x:auto;scrollbar-width:none}
.categories::-webkit-scrollbar{display:none}
.cat{padding:8px 16px;border-radius:100px;font-size:13px;font-weight:500;background:var(--card);color:var(--muted);cursor:pointer;white-space:nowrap;border:1px solid var(--border);transition:.2s}
.cat.active{background:var(--charcoal);color:#fff;border-color:var(--charcoal)}
.goods-grid{padding:4px 20px;display:flex;flex-direction:column;gap:10px}
.gc{background:var(--card);border-radius:var(--radius);overflow:hidden;cursor:pointer;border:1px solid var(--border);transition:.2s}
.gc:active{transform:scale(0.985)}
.gci{display:flex;padding:14px;gap:14px}
.gicon{width:68px;height:68px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.gicon.b1{background:#F5F0EB}.gicon.b2{background:#F0F3F7}.gicon.b3{background:#F0F7F2}.gicon.b4{background:#FDF0ED}.gicon.b5{background:#F5F0EB}.gicon.b6{background:var(--ivory)}
.ginfo{flex:1;min-width:0}
.gtitle{font-size:15px;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.gprice{color:var(--rose-dark);font-weight:700;font-size:18px;margin-top:4px}
.gprice .cat-tag{font-weight:400;font-size:12px;color:var(--muted);margin-left:4px}
.gmeta{display:flex;gap:10px;margin-top:4px;font-size:12px;color:var(--muted)}
.tabbar{position:fixed;bottom:0;left:0;right:0;background:var(--card);display:flex;border-top:1px solid var(--border);z-index:100;padding:6px 0 calc(6px+env(safe-area-inset-bottom))}
.ti{flex:1;text-align:center;padding:4px 0;font-size:10px;color:var(--muted);cursor:pointer;transition:.2s}
.ti .ticon{font-size:22px;display:block;margin-bottom:2px}
.ti.active{color:var(--charcoal)}.ti.active .ticon{transform:translateY(-2px)}
.ti .tdot{display:none;width:4px;height:4px;border-radius:50%;background:var(--rose-dark);margin:2px auto 0}
.ti.active .tdot{display:block}
.btn{display:block;width:100%;padding:15px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;text-align:center;transition:.2s}
.btn-primary{background:var(--charcoal);color:#fff}.btn-primary:active{transform:scale(0.97)}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--muted);font-weight:500}.btn-outline:active{background:var(--ivory)}
.form-section{padding:8px 20px 20px}
.fg{margin-bottom:18px}
.fg label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;padding:13px 14px;border:1.5px solid var(--border);border-radius:11px;font-size:15px;outline:none;background:var(--card);transition:.2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--rose);box-shadow:0 0 0 3px rgba(232,166,155,0.1)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.empty{padding:80px 20px;text-align:center}
.empty .ea{font-size:56px;margin-bottom:16px;opacity:.5}
.empty h3{font-size:17px;font-weight:600;margin-bottom:4px}
.empty p{font-size:14px;color:var(--muted)}
.tag{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600}
.tag.g{background:var(--success-bg);color:var(--success)}
.tag.r{background:var(--error-bg);color:var(--error)}
.tag.y{background:var(--gold-bg);color:var(--gold)}
.alert{padding:11px 14px;border-radius:10px;font-size:13px;margin-bottom:14px;display:none;font-weight:500}
.alert.s{background:var(--success-bg);color:var(--success);display:block}
.alert.e{background:var(--error-bg);color:var(--error);display:block}
.spinner{display:flex;justify-content:center;padding:30px}
.spinner::after{content:'';width:26px;height:26px;border:2px solid var(--border);border-top-color:var(--charcoal);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.otab{display:flex;padding:12px 20px;gap:8px}
.ot{flex:1;padding:10px;border-radius:100px;font-size:13px;font-weight:600;cursor:pointer;background:var(--card);color:var(--muted);border:1px solid var(--border);text-align:center;transition:.2s}
.ot.active{background:var(--charcoal);color:#fff;border-color:var(--charcoal)}
.olist{padding:4px 20px;display:flex;flex-direction:column;gap:10px}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:200}
.modal-overlay.active{display:flex}.modal-bg{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(44,36,34,0.5);backdrop-filter:blur(12px)}
.modal-overlay.active .modal-bg{opacity:1}
.modal-overlay.active .modal-sheet{transform:translateY(0)}
.modal-sheet{position:relative;background:var(--card);border-radius:24px 24px 0 0;padding:12px 24px 24px;width:100%;max-height:85vh;overflow-y:auto;transform:translateY(100%);transition:transform .4s cubic-bezier(0.22,1,0.36,1)}
.mi{width:36px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 14px}
.mt{font-size:17px;font-weight:700;margin-bottom:14px}
.detail-banner{margin:-12px -24px 14px;height:180px;display:flex;align-items:center;justify-content:center;font-size:64px}
.detail-title{font-size:20px;font-weight:700}
.detail-price{font-size:26px;color:var(--rose-dark);font-weight:700;margin:8px 0 14px}
.detail-desc{background:var(--ivory);padding:14px;border-radius:11px;font-size:14px;line-height:1.7;margin:10px 0}
.detail-meta{font-size:13px;color:var(--muted);display:flex;flex-wrap:wrap;gap:10px;padding:6px 0}
.detail-actions{display:flex;gap:10px;margin-top:14px}
.fav-row{margin-top:14px}
.fav-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:13px;border:1.5px solid var(--border);border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;background:var(--card);color:var(--muted);transition:.2s}
.fav-btn:active{transform:scale(0.97)}
.fav-btn.fav-active{border-color:var(--gold);background:var(--gold-bg);color:var(--gold)}
.fav-btn .fav-star{font-size:18px}
.cat-row{display:flex;gap:6px;padding:4px 20px 6px;overflow-x:auto;scrollbar-width:none}
.cat-row::-webkit-scrollbar{display:none}
.cat-row+.cat-row{padding-top:0;padding-bottom:12px}
.ir{margin:14px 0}.ir div{display:flex;padding:12px 0;border-bottom:1px solid var(--ivory);font-size:14px}.ir div:last-child{border-bottom:none}.ir .l{color:var(--muted);width:80px;flex-shrink:0;font-size:13px}.ir .v{font-weight:500}
.profile-empty{padding:100px 24px;text-align:center}
.profile-empty .ac{width:88px;height:88px;border-radius:50%;background:var(--rose-light);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:38px}
.profile-empty h2{font-size:21px;margin-bottom:4px}
.profile-empty p{font-size:14px;color:var(--muted);margin-bottom:24px}
.profile-hero{text-align:center;padding:32px 20px 24px}
.profile-hero .pha{width:72px;height:72px;border-radius:50%;background:var(--rose-light);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:32px}
.profile-hero .phn{font-size:20px;font-weight:700}
.profile-hero .phs{font-size:13px;color:var(--muted);margin-top:2px}
.profile-badge{display:inline-block;padding:3px 12px;border-radius:100px;font-size:11px;font-weight:600;margin-top:6px;background:var(--gold-bg);color:var(--gold)}
.profile-badge.v{background:var(--success-bg);color:var(--success)}
.ms{padding:4px 20px}.mc{background:var(--card);border-radius:var(--radius);overflow:hidden;margin-bottom:10px;border:1px solid var(--border)}
.mi2{display:flex;align-items:center;padding:15px 16px;border-bottom:1px solid var(--ivory);cursor:pointer;gap:12px;font-size:14px;font-weight:500;transition:.15s}
.mi2:last-child{border-bottom:none}.mi2:active{background:var(--ivory);padding-left:20px}
.mi2 .mi2i{font-size:18px;width:22px;text-align:center}.mi2 .mi2a{margin-left:auto;color:var(--border);font-size:14px}
.lw{padding:12px 20px;margin-top:8px}
.lobtn{width:100%;padding:14px;border:1px solid var(--border);border-radius:14px;text-align:center;color:var(--error);font-size:14px;font-weight:500;cursor:pointer;background:var(--card)}
.lobtn:active{background:var(--error-bg)}

/* msgConversationView */
.citem{display:flex;align-items:center;padding:14px 0;gap:14px;border-bottom:1px solid var(--ivory);cursor:pointer;margin:0 20px}
.citem:active{background:var(--ivory);margin:0;padding:14px 20px;border-radius:12px}
.citem .ca{width:44px;height:44px;border-radius:50%;background:var(--rose-light);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.citem .ci{flex:1;min-width:0}
.citem .cn{font-weight:600;font-size:14px}
.citem .cp{font-size:12px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Chat */
.msg-bubble{max-width:80%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.5;word-break:break-word;margin-bottom:2px}
.msg-bubble.mine{background:var(--charcoal);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg-bubble.theirs{background:var(--ivory);color:var(--charcoal);align-self:flex-start;border-bottom-left-radius:4px}
.chat-order-card{margin:8px 0;padding:12px;border-radius:11px;background:var(--ivory);border:1px solid var(--border)}
.chat-order-card .co-title{font-size:13px;font-weight:600}
.chat-order-card .co-price{color:var(--rose-dark);font-weight:700;font-size:14px;margin:4px 0}
.chat-order-card .co-actions{display:flex;gap:8px;margin-top:6px}
.chat-order-card .co-actions button{flex:1;padding:7px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer}

.img-upload-area{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.img-upload-hint{font-size:11px;color:var(--muted);margin-bottom:8px;line-height:1.5}
.img-upload-box{width:72px;height:72px;border-radius:12px;border:1.5px dashed var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;flex-shrink:0;overflow:hidden;position:relative;background:var(--card)}
.img-upload-box:hover{border-color:var(--rose);background:var(--rose-light)}
.img-upload-box .add-icon{font-size:28px;color:var(--muted)}
.img-preview{width:100%;height:100%;object-fit:cover}
.img-delete{position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,0.55);color:#fff;font-size:12px;line-height:20px;text-align:center;cursor:pointer;display:none}
.img-upload-box:hover .img-delete{display:block}
.img-upload-box.has-img{border-style:solid;border-color:var(--border)}

@media(min-width:500px){body{max-width:420px;margin:0 auto;border-left:1px solid var(--border);border-right:1px solid var(--border);min-height:100vh;background:var(--card)}}
</style>
</head>
<body>

<!-- HOME -->
<div id="page-home" class="page active">
  <div class="page-header"><h1>校园二手</h1><div style="width:36px;height:36px;border-radius:50%;background:var(--ivory);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer">🔔</div></div>
  <div class="search-box">
    <span class="si">🔍</span>
    <input id="searchInput" placeholder="搜索商品..." onkeydown="if(event.key=='Enter')searchGoods()">
    <button class="sb" onclick="searchGoods()">搜索</button>
  </div>
  <div id="catTags">
    <div class="cat-row">
      <span class="cat active" onclick="filterCat('')">全部</span>
      <span class="cat" onclick="filterCat('favorites')">⭐ 收藏</span>
    </div>
    <div class="cat-row">
      <span class="cat" onclick="filterCat('教材教辅')">📖 教材</span>
      <span class="cat" onclick="filterCat('电子数码')">💻 数码</span>
      <span class="cat" onclick="filterCat('生活用品')">🏡 生活</span>
      <span class="cat" onclick="filterCat('服饰美妆')">👗 服饰</span>
    </div>
  </div>
  <div class="goods-grid" id="goodsList"></div>
</div>

<!-- MESSAGE -->
<div id="page-message" class="page">
  <div id="msgConvView">
    <div class="page-header"><h1>消息</h1></div>
    <div id="convList"></div>
  </div>
</div>

<!-- PUBLISH -->
<div id="page-publish" class="page">
  <div class="page-header"><h1>发布</h1></div>
  <div class="form-section">
    <div id="pubAlert" class="alert"></div>
    <div class="fg"><label>标题</label><input id="pubTitle" placeholder="如：高等数学第七版 九成新"></div>
    <div class="fr"><div class="fg"><label>分类</label><select id="pubCategory"><option>教材教辅</option><option>电子数码</option><option>生活用品</option><option>服饰美妆</option><option>体育用品</option><option>其他</option></select></div><div class="fg"><label>价格</label><input id="pubPrice" type="number" step="0.01" placeholder="0.00"></div></div>
    <div class="fg"><label>描述</label><input id="pubDesc" placeholder="简要描述新旧程度等"></div>
    <div class="fg"><label>详细信息</label><textarea id="pubDetail" placeholder="详细描述商品的使用情况、瑕疵、配件等（选填）" rows="4" style="resize:vertical;font-family:inherit"></textarea></div>
    <div class="fr"><div class="fg"><label>电话</label><input id="pubPhone" placeholder="手机号"></div><div class="fg"><label>微信</label><input id="pubWechat" placeholder="微信号(选填)"></div></div>
    <div class="fg"><label>位置</label><input id="pubLocation" placeholder="如：主校区"></div>
    <div class="fg"><label>图片</label>
      <div class="img-upload-hint">支持 JPG/PNG/GIF/BMP/WebP 格式，单张不超过 5MB，最多 6 张</div>
      <div class="img-upload-area" id="imgUploadArea">
        <div class="img-upload-box" onclick="document.getElementById('imageFileInput').click()">
          <span class="add-icon">+</span>
        </div>
      </div>
      <input type="file" id="imageFileInput" accept="image/jpeg,image/png,image/gif,image/bmp,image/webp" multiple style="display:none" onchange="handleImageSelect(event)">
    </div>
    <div id="pubUploadStatus" style="font-size:12px;color:var(--muted);margin-bottom:12px;display:none"></div>
    <button class="btn btn-primary" onclick="publishGoods()" style="margin-top:6px">发布</button>
  </div>
</div>

<!-- ORDERS -->
<div id="page-orders" class="page">
  <div class="page-header"><h1>订单</h1></div>
  <div class="otab"><div class="ot active" onclick="switchOrderTab('buy',this)">我买到的</div><div class="ot" onclick="switchOrderTab('sell',this)">我卖出的</div></div>
  <div class="olist" id="ordersList"></div>
</div>

<!-- PROFILE -->
<div id="page-profile" class="page"><div id="profileContent"></div></div>

<!-- TABBAR -->
<div class="tabbar">
  <div class="ti active" onclick="switchTab('home')"><span class="ticon">🏠</span>首页<div class="tdot"></div></div>
  <div class="ti" onclick="switchTab('message')"><span class="ticon">💬</span>消息<span id="unreadBadge" style="display:none;position:absolute;top:2px;right:8px;background:var(--rose-dark);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px">0</span><div class="tdot"></div></div>
  <div class="ti" onclick="switchTab('publish')"><span class="ticon">✏️</span>发布<div class="tdot"></div></div>
  <div class="ti" onclick="switchTab('orders')"><span class="ticon">📋</span>订单<div class="tdot"></div></div>
  <div class="ti" onclick="switchTab('profile')"><span class="ticon">👤</span>我的<div class="tdot"></div></div>
</div>

<!-- CHAT OVERLAY -->
<div id="chatOverlay" style="display:none;position:fixed;top:0;bottom:80px;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:var(--cream);z-index:300;flex-direction:column">
  <div style="padding:48px 20px 12px;background:var(--card);display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);flex-shrink:0">
    <span onclick="closeChatOverlay()" style="font-size:24px;cursor:pointer;padding:4px;line-height:1">←</span>
    <div><div id="chatTargetName" style="font-weight:700;font-size:16px">加载中...</div><div id="chatTargetSub" style="font-size:12px;color:var(--muted)">加载中</div></div>
  </div>
  <div id="chatOrderArea" style="padding:0 20px;flex-shrink:0"></div>
  <div id="chatMsgs" style="flex:1;overflow-y:auto;padding:10px 20px;display:flex;flex-direction:column;min-height:0"></div>
  <div style="flex-shrink:0;padding:8px 16px calc(8px+env(safe-area-inset-bottom));background:var(--card);border-top:1px solid var(--border);display:flex;gap:8px">
    <input id="chatInput" placeholder="输入消息..." onkeydown="if(event.key=='Enter')sendChatMsg()" style="flex:1;padding:12px 14px;border:1.5px solid var(--border);border-radius:11px;font-size:15px;outline:none;font-family:inherit;background:var(--ivory)">
    <button onclick="sendChatMsg()" style="padding:12px 20px;border:none;border-radius:11px;background:var(--charcoal);color:#fff;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap">发送</button>
  </div>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="detailModal"><div class="modal-bg" onclick="closeModal('detailModal')"></div><div class="modal-sheet" id="detailContent"><div class="mi"></div><div class="btn btn-outline" onclick="closeModal('detailModal')">关闭</div></div></div>
<div class="modal-overlay" id="authModal"><div class="modal-bg" onclick="closeModal('authModal')"></div><div class="modal-sheet"><div class="mi"></div><div class="mt">🎓 校园认证</div><div id="authAlert" class="alert"></div><div id="authFormArea"><div class="fg"><input id="authStudentId" placeholder="学号"></div><div class="fg"><input id="authRealName" placeholder="真实姓名"></div><p style="font-size:12px;color:var(--muted);margin-bottom:12px">💡 提交后需管理员审核</p><button class="btn btn-primary" onclick="submitAuth()">提交</button><button class="btn btn-outline" onclick="closeModal('authModal')" style="margin-top:6px">取消</button></div><div id="authDoneArea" style="display:none;text-align:center;padding:20px 0"><p style="font-size:24px;margin-bottom:10px">✅</p><p style="font-size:16px;font-weight:600;color:var(--success);margin-bottom:4px">您已通过校园认证</p><p style="font-size:13px;color:var(--muted);margin-bottom:16px">可以发布商品和进行交易了</p><button class="btn btn-outline" onclick="closeModal('authModal')">确定</button></div></div></div>
<div class="modal-overlay" id="loginModal"><div class="modal-bg" onclick="closeModal('loginModal')"></div><div class="modal-sheet"><div class="mi"></div><div class="mt">🔑 登录</div><div id="loginAlert" class="alert"></div><div class="fg"><input id="loginAccount" placeholder="账号"></div><div class="fg"><input id="loginPassword" type="password" placeholder="密码"></div><div class="fr" style="margin-bottom:14px"><select id="loginRole"><option value="user">用户</option><option value="admin">管理员</option></select><label style="display:flex;align-items:center;gap:4px;font-size:13px;color:var(--muted)"><input type="checkbox" id="loginRemember"> 记住</label></div><button class="btn btn-primary" onclick="login()">登录</button><p style="text-align:center;margin-top:12px;font-size:13px;color:var(--muted)">没有账号？<a style="color:var(--charcoal);font-weight:600;cursor:pointer" onclick="closeModal('loginModal');openModal('registerModal')">去注册</a></p></div></div>

<script>
const API='http://localhost:8080';
function T(){return localStorage.getItem('token')}
function U(){try{return JSON.parse(localStorage.getItem('user'))}catch(e){return null}}
function setLogin(t,u){localStorage.setItem('token',t);localStorage.setItem('user',JSON.stringify(u));closeModal('loginModal');closeModal('registerModal');switchTab('profile');renderProfile()}
function closeModal(i){document.getElementById(i).classList.remove('active')}
function openModal(i){document.getElementById(i).classList.add('active')}
function switchTab(n){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'))
  document.getElementById('page-'+n).classList.add('active')
  document.querySelectorAll('.ti').forEach(t=>t.classList.remove('active'))
  const m={home:0,message:1,publish:2,orders:3,profile:4}
  document.querySelectorAll('.ti')[m[n]].classList.add('active')
  if(n==='home')loadGoods()
  if(n==='profile')renderProfile()
  if(n==='orders')renderOrders()
  if(n==='message'){closeChatOverlay();loadConvs()}
}

// GOODS
let curCat='',curKw=''
function filterCat(c){curCat=c;document.querySelectorAll('.cat').forEach(t=>t.classList.remove('active'));event.target.classList.add('active');loadGoods()}
function searchGoods(){curKw=document.getElementById('searchInput').value;loadGoods()}
async function loadGoods(){
  const el=document.getElementById('goodsList');el.innerHTML='<div class="spinner"></div>'
  if(curCat==='favorites'){
    const u=U();if(!u){el.innerHTML='<div class="empty"><div class="ea">⭐</div><h3>请先登录</h3><p>登录后查看收藏商品</p></div>';return}
    try{
      const r=await fetch(`${API}/api/favorite/list`,{headers:{'Authorization':'Bearer '+T()}})
      const d=await r.json()
      if(d.code===200&&d.data){
        if(!d.data.length){el.innerHTML='<div class="empty"><div class="ea">⭐</div><h3>暂无收藏</h3><p>浏览商品时点击收藏即可添加</p></div>';return}
        el.innerHTML=d.data.map(g=>{
          const ic=g.category==='教材教辅'?'📖':g.category==='电子数码'?'💻':g.category==='生活用品'?'🏡':g.category==='服饰美妆'?'👗':g.category==='体育用品'?'⚽':'📎'
          const cl=g.category==='教材教辅'?'b1':g.category==='电子数码'?'b2':g.category==='生活用品'?'b3':g.category==='服饰美妆'?'b4':g.category==='体育用品'?'b5':'b6'
          const imgHtml=g.images&&g.images.length>0?`<img src="${API+g.images.split(',')[0]}" style="width:68px;height:68px;border-radius:12px;object-fit:cover;flex-shrink:0" onerror="this.parentNode.querySelector('.gicon').style.display='flex';this.style.display='none'"><div class="gicon ${cl}" style="display:none">${ic}</div>`:`<div class="gicon ${cl}">${ic}</div>`
          return `<div class="gc" onclick="showDetail(${g.id})"><div class="gci">${imgHtml}<div class="ginfo"><div class="gtitle">${g.title}</div><div class="gprice">¥${g.price}<span class="cat-tag">${g.category||''}</span></div><div class="gmeta"><span>📍 ${g.location||'校内'}</span><span class="tag g">在售</span></div></div></div></div>`
        }).join('')
      }else{el.innerHTML='<div class="empty"><div class="ea">😶</div><h3>加载失败</h3></div>'}
    }catch(e){el.innerHTML='<div class="empty"><div class="ea">😶</div><h3>网络开小差了</h3></div>'}
    return
  }
  let u=`${API}/api/goods/list?page=0&size=50`
  if(curCat)u+=`&category=${curCat}`;if(curKw)u+=`&keyword=${curKw}`
  try{
    const r=await fetch(u);const d=await r.json()
    if(d.code===200&&d.data&&d.data.content){
      if(!d.data.content.length){el.innerHTML='<div class="empty"><div class="ea">📦</div><h3>这里还空空的</h3></div>';return}
      el.innerHTML=d.data.content.map(g=>{
        const ic=g.category==='教材教辅'?'📖':g.category==='电子数码'?'💻':g.category==='生活用品'?'🏡':g.category==='服饰美妆'?'👗':g.category==='体育用品'?'⚽':'📎'
        const cl=g.category==='教材教辅'?'b1':g.category==='电子数码'?'b2':g.category==='生活用品'?'b3':g.category==='服饰美妆'?'b4':g.category==='体育用品'?'b5':'b6'
        const imgHtml=g.images&&g.images.length>0?`<img src="${API+g.images.split(',')[0]}" style="width:68px;height:68px;border-radius:12px;object-fit:cover;flex-shrink:0" onerror="this.parentNode.querySelector('.gicon').style.display='flex';this.style.display='none'"><div class="gicon ${cl}" style="display:none">${ic}</div>`:`<div class="gicon ${cl}">${ic}</div>`
        return `<div class="gc" onclick="showDetail(${g.id})"><div class="gci">${imgHtml}<div class="ginfo"><div class="gtitle">${g.title}</div><div class="gprice">¥${g.price}<span class="cat-tag">${g.category||''}</span></div><div class="gmeta"><span>📍 ${g.location||'校内'}</span><span class="tag g">在售</span></div></div></div></div>`
      }).join('')
    }else{el.innerHTML='<div class="empty"><div class="ea">😶</div><h3>加载失败</h3></div>'}
  }catch(e){el.innerHTML='<div class="empty"><div class="ea">😶</div><h3>网络开小差了</h3></div>'}
}

async function showDetail(id){
  try{
    const r=await fetch(`${API}/api/goods/${id}`);const d=await r.json()
    if(d.code===200&&d.data){
      const g=d.data;const u=U()
      const ic=g.category==='教材教辅'?'📖':g.category==='电子数码'?'💻':g.category==='生活用品'?'🏡':g.category==='服饰美妆'?'👗':g.category==='体育用品'?'⚽':'📎'
      const bg=g.category==='教材教辅'?'#F5F0EB':g.category==='电子数码'?'#F0F3F7':g.category==='生活用品'?'#F0F7F2':g.category==='服饰美妆'?'#FDF0ED':g.category==='体育用品'?'#F5F0EB':'#F9F4F0'
      const own=u&&g.userId==u.userId
      let favHtml=''
      if(u&&!own){
        try{
          const fr=await fetch(`${API}/api/favorite/check/${g.id}`,{headers:{'Authorization':'Bearer '+T()}})
          const fd=await fr.json()
          const favorited=fd.code===200&&fd.data
          favHtml=`<div class="fav-row"><button class="fav-btn ${favorited?'fav-active':''}" onclick="toggleFavorite(${g.id})"><span class="fav-star">${favorited?'★':'☆'}</span> ${favorited?'\u5df2\u6536\u85cf':'\u6536\u85cf'}</button></div>`
        }catch(e){}
      }
      let bannerHtml
      if(g.images&&g.images.length>0){
        bannerHtml=g.images.split(',').map(url=>`<img src="${API+url}" style="width:100%;height:180px;object-fit:cover;display:block" onerror="this.parentNode.querySelector('.detail-banner-fallback').style.display='flex';this.style.display='none'">`).join('')+`<div class="detail-banner-fallback" style="width:100%;height:180px;display:none;align-items:center;justify-content:center;font-size:64px;background:${bg}">${ic}</div>`
      }else{
        bannerHtml=`<div style="width:100%;height:180px;display:flex;align-items:center;justify-content:center;font-size:64px;background:${bg}">${ic}</div>`
      }
      document.getElementById('detailContent').innerHTML=`<div class="mi"></div><div class="detail-banner" style="padding:0;height:auto">${bannerHtml}</div><div class="detail-title">${g.title}</div><div class="detail-price">¥${g.price}</div>${g.description?`<div class="detail-desc">${g.description}</div>`:''}${g.descriptionDetail?`<div class="detail-desc" style="white-space:pre-wrap;word-break:break-word">${g.descriptionDetail}</div>`:''}<div class="detail-meta"><span>📞 ${g.contactPhone||'未填'}</span>${g.wechat?`<span>💬 ${g.wechat}</span>`:''}<span>📍 ${g.location||'校内'}</span></div>${favHtml}<div class="detail-actions">${own?'<div style="padding:15px;border-radius:12px;background:var(--ivory);text-align:center;font-size:14px;color:var(--muted);width:100%">这是我的商品</div>':`<button class="btn btn-primary" onclick="contactSeller(${g.id},${g.userId},'${g.title.replace(/'/g,"\\'")}')">💬 联系卖家</button>`}<button class="btn btn-outline" onclick="closeModal('detailModal')">关闭</button></div>`
      openModal('detailModal')
    }
  }catch(e){}
}

function toggleFavorite(goodsId){
  const u=U();if(!u){openModal('loginModal');return}
  fetch(`${API}/api/favorite/toggle?goodsId=${goodsId}`,{method:'POST',headers:{'Authorization':'Bearer '+T()}})
  .then(r=>r.json()).then(d=>{
    if(d.code===200){
      const btn=document.querySelector('.fav-btn')
      if(btn){
        const favorited=d.data
        btn.className='fav-btn'+(favorited?' fav-active':'')
        btn.innerHTML=`<span class="fav-star">${favorited?'★':'☆'}</span> ${favorited?'\u5df2\u6536\u85cf':'\u6536\u85cf'}`
      }
    }
  }).catch(()=>{})
}

// CHAT
let chatTarget=null,chatGoodsId=null,chatGoodsTitle='',chatPoll=null
function contactSeller(gid,sid,title){
  closeModal('detailModal');const u=U()
  if(!u){openModal('loginModal');return}
  chatTarget=sid;chatGoodsId=gid;chatGoodsTitle=title||''
  openChatOverlay()
}
function openChatOverlay(){
  document.getElementById('chatOverlay').style.display='flex'
  document.getElementById('chatTargetName').textContent='加载中...'
  document.getElementById('chatTargetSub').textContent=chatGoodsTitle?'关于: '+chatGoodsTitle:'商品咨询'
  const oc=document.getElementById('chatOrderArea')
  if(chatGoodsId)oc.innerHTML=`<div class="chat-order-card"><div class="co-title">📦 ${chatGoodsTitle||'商品'}</div><div class="co-actions"><button style="background:var(--charcoal);color:#fff" onclick="createOrderFromChat()">创建订单</button><button style="background:var(--ivory);color:var(--charcoal)" onclick="document.getElementById('chatOrderArea').innerHTML=''">收起</button></div></div>`
  else oc.innerHTML=''
  fetch(`${API}/api/user/info/${chatTarget}`,{headers:{'Authorization':'Bearer '+T()}}).then(r=>r.json()).then(d=>{if(d.code===200&&d.data)document.getElementById('chatTargetName').textContent=d.data.username})
  loadChatMsgs()
  if(chatPoll)clearInterval(chatPoll)
  chatPoll=setInterval(loadChatMsgs,2000)
}
function closeChatOverlay(){
  if(chatPoll){clearInterval(chatPoll);chatPoll=null}
  document.getElementById('chatOverlay').style.display='none'
  loadConvs()
}
async function loadChatMsgs(){
  if(!chatTarget||!T()){document.getElementById('chatMsgs').innerHTML='<div style="padding:40px;text-align:center;color:var(--muted);font-size:14px">请先登录</div>';return}
  try{
    const r=await fetch(`${API}/api/message/conversation?targetUserId=${chatTarget}`,{headers:{'Authorization':'Bearer '+T()}})
    const d=await r.json()
    const el=document.getElementById('chatMsgs')
    const user=U()
    if(d.code===200&&d.data&&d.data.length>0){
      el.innerHTML=d.data.map(m=>{
        const mine=m.fromUserId==user.userId
        return `<div class="msg-bubble ${mine?'mine':'theirs'}">${m.content}</div>`
      }).join('')
      el.scrollTop=el.scrollHeight
    }else{el.innerHTML='<div style="padding:40px;text-align:center;color:var(--muted);font-size:14px">💬 发送第一条消息吧</div>'}
  }catch(e){}
}
function sendChatMsg(){
  const input=document.getElementById('chatInput');const c=input.value.trim()
  if(!c||!chatTarget)return;input.value=''
  fetch(`${API}/api/message/send`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+T()},body:JSON.stringify({toUserId:parseInt(chatTarget),content:c,goodsId:chatGoodsId?parseInt(chatGoodsId):null})}).then(r=>r.json()).then(()=>setTimeout(loadChatMsgs,300)).catch(()=>{})
}
async function createOrderFromChat(){
  const u=U();if(!u){openModal('loginModal');return}
  try{
    const r=await fetch(`${API}/api/goods/${chatGoodsId}`);const d=await r.json()
    if(d.code===200&&d.data){
      const g=d.data
      const od=await(await fetch(`${API}/api/order/create`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+T()},body:JSON.stringify({goodsId:parseInt(chatGoodsId),sellerId:parseInt(chatTarget),totalPrice:g.price,remark:'来自聊天'})})).json()
      if(od.code===200){
        await fetch(`${API}/api/message/send`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+T()},body:JSON.stringify({toUserId:parseInt(chatTarget),content:'📋 我已创建订单',goodsId:parseInt(chatGoodsId)})})
        document.getElementById('chatOrderArea').innerHTML=`<div class="chat-order-card"><div class="co-title">✅ 订单已创建</div><div class="co-price">¥${g.price}</div></div>`
        loadChatMsgs()
      }else{alert('创建失败')}
    }
  }catch(e){alert('创建失败')}
}

// CONVERSATIONS
async function loadConvs(){
  const u=U()
  if(!u){document.getElementById('convList').innerHTML='<div class="empty"><div class="ea">💬</div><h3>请先登录</h3></div>';return}
  try{
    const r=await fetch(`${API}/api/goods/list?page=0&size=100`)
    const d=await r.json()
    if(d.code===200&&d.data&&d.data.content){
      const sellers=[...new Set(d.data.content.filter(g=>g.userId!=u.userId).map(g=>g.userId))]
      if(!sellers.length){document.getElementById('convList').innerHTML='<div class="empty"><div class="ea">💬</div><h3>暂无消息</h3></div>';return}
      Promise.all(sellers.map(sid=>fetch(`${API}/api/user/info/${sid}`,{headers:{'Authorization':'Bearer '+T()}}).then(r=>r.json()).then(d=>{const n=d.code===200&&d.data?d.data.username:'用户'+sid;return`<div class="citem" onclick="chatTarget=${sid};chatGoodsId=null;chatGoodsTitle='';openChatOverlay()"><div class="ca">👤</div><div class="ci"><div class="cn">${n}</div><div class="cp">点击开始聊天</div></div></div>`}).catch(()=>''))).then(items=>{document.getElementById('convList').innerHTML=items.join('')||'<div class="empty"><div class="ea">💬</div><h3>暂无消息</h3></div>'})
    }
  }catch(e){}
  try{
    const r=await fetch(`${API}/api/message/unread`,{headers:{'Authorization':'Bearer '+T()}})
    const d=await r.json()
    if(d.code===200&&d.data>0){document.getElementById('unreadBadge').style.display='block';document.getElementById('unreadBadge').textContent=d.data}else{document.getElementById('unreadBadge').style.display='none'}
  }catch(e){}
}

// PUBLISH
var selectedFiles = []
function handleImageSelect(event) {
  var files = event.target.files
  if (!files || !files.length) return
  var totalAfterAdd = selectedFiles.length + files.length
  if (totalAfterAdd > 6) {
    document.getElementById('pubAlert').className = 'alert e'
    document.getElementById('pubAlert').textContent = '最多上传 6 张图片，当前已选 ' + selectedFiles.length + ' 张'
    event.target.value = ''
    return
  }
  document.getElementById('pubAlert').className = 'alert'
  document.getElementById('pubAlert').textContent = ''
  var validExts = ['.jpg','.jpeg','.png','.gif','.bmp','.webp']
  for (var i = 0; i < files.length; i++) {
    var f = files[i]
    if (f.size > 5 * 1024 * 1024) {
      document.getElementById('pubAlert').className = 'alert e'
      document.getElementById('pubAlert').textContent = '图片 "' + f.name + '" 超过 5MB 限制'
      event.target.value = ''
      return
    }
    var ext = '.' + f.name.split('.').pop().toLowerCase()
    if (validExts.indexOf(ext) === -1) {
      document.getElementById('pubAlert').className = 'alert e'
      document.getElementById('pubAlert').textContent = '不支持的格式: ' + f.name + '，仅支持 JPG/PNG/GIF/BMP/WebP'
      event.target.value = ''
      return
    }
    selectedFiles.push(f)
  }
  event.target.value = ''
  renderImagePreviews()
}
function removeImage(index) {
  selectedFiles.splice(index, 1)
  renderImagePreviews()
}
function renderImagePreviews() {
  var container = document.getElementById('imgUploadArea')
  var html = ''
  for (var i = 0; i < selectedFiles.length; i++) {
    var url = URL.createObjectURL(selectedFiles[i])
    html += '<div class="img-upload-box has-img"><img class="img-preview" src="' + url + '"><span class="img-delete" onclick="event.stopPropagation();removeImage(' + i + ')">✕</span></div>'
  }
  if (selectedFiles.length < 6) {
    html += '<div class="img-upload-box" onclick="document.getElementById(\'imageFileInput\').click()"><span class="add-icon">+</span></div>'
  }
  container.innerHTML = html
}
function resetImageUpload() {
  selectedFiles = []
  renderImagePreviews()
  document.getElementById('pubUploadStatus').style.display = 'none'
  document.getElementById('pubUploadStatus').textContent = ''
}
async function uploadImages() {
  if (!selectedFiles.length) return ''
  var statusEl = document.getElementById('pubUploadStatus')
  statusEl.style.display = 'block'
  statusEl.textContent = '正在上传图片...'
  var urls = []
  for (var i = 0; i < selectedFiles.length; i++) {
    statusEl.textContent = '正在上传第 ' + (i + 1) + '/' + selectedFiles.length + ' 张图片...'
    var formData = new FormData()
    formData.append('file', selectedFiles[i])
    try {
      var r = await fetch(API + '/api/upload/image', { method: 'POST', body: formData })
      var d = await r.json()
      if (d.code === 200 && d.data) {
        urls.push(d.data.url)
      } else {
        statusEl.textContent = ''
        statusEl.style.display = 'none'
        throw new Error(d.message || '上传失败')
      }
    } catch (e) {
      statusEl.textContent = ''
      statusEl.style.display = 'none'
      throw e
    }
  }
  statusEl.textContent = '✅ 图片上传完成'
  setTimeout(function() { statusEl.style.display = 'none' }, 1500)
  return urls.join(',')
}
function resetPublishForm(){
  document.getElementById('pubTitle').value=''
  document.getElementById('pubCategory').selectedIndex=0
  document.getElementById('pubPrice').value=''
  document.getElementById('pubDesc').value=''
  document.getElementById('pubDetail').value=''
  document.getElementById('pubPhone').value=''
  document.getElementById('pubWechat').value=''
  document.getElementById('pubLocation').value=''
  resetImageUpload()
}
async function publishGoods(){
  var u=U();if(!u){openModal('loginModal');return}
  var d={title:document.getElementById('pubTitle').value,category:document.getElementById('pubCategory').value,price:document.getElementById('pubPrice').value,description:document.getElementById('pubDesc').value,contactPhone:document.getElementById('pubPhone').value,wechat:document.getElementById('pubWechat').value,location:document.getElementById('pubLocation').value}
  if(!d.title||!d.price){document.getElementById('pubAlert').className='alert e';document.getElementById('pubAlert').textContent='请填写标题和价格';return}
  document.getElementById('pubAlert').className='alert';document.getElementById('pubAlert').textContent=''
  try{
    var imageUrls = ''
    if (selectedFiles.length > 0) {
      imageUrls = await uploadImages()
    }
    d.images = imageUrls
    var r=await fetch(API+'/api/goods/create',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+T()},body:JSON.stringify(d)})
    if(!r.ok){document.getElementById('pubAlert').className='alert e';document.getElementById('pubAlert').textContent='❌ 服务器错误 '+(r.status)+'，请查看控制台';return}

    else{document.getElementById('pubAlert').className='alert e';document.getElementById('pubAlert').textContent='❌ '+(rd.message||'失败')}
  }catch(e){document.getElementById('pubAlert').className='alert e';document.getElementById('pubAlert').textContent='❌ 网络错误，请确认已登录且后端服务已启动'}

// ORDERS
let ordTab='buy'
function switchOrderTab(tab,el){ordTab=tab;document.querySelectorAll('.ot').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderOrders()}
async function renderOrders(){
  const u=U()
  if(!u){document.getElementById('ordersList').innerHTML='<div class="empty"><div class="ea">🔒</div><h3>请先登录</h3></div>';return}
  const el=document.getElementById('ordersList');el.innerHTML='<div class="spinner"></div>'
  try{
    const r=await fetch(`${API}/api/order/${ordTab==='buy'?'buy':'sell'}?page=0&size=50`,{headers:{'Authorization':'Bearer '+T()}})
    const d=await r.json()
    if(d.code===200&&d.data&&d.data.content){
      if(!d.data.content.length){el.innerHTML='<div class="empty"><div class="ea">📋</div><h3>暂无订单</h3></div>';return}
      el.innerHTML=d.data.content.map(o=>{
        const sm={pending:'待处理',paid:'已付款',shipped:'已发货',received:'已收货',cancelled:'已取消'}
        const tc=o.status==='pending'?'y':o.status==='cancelled'?'r':'g'
        const as=ordTab==='sell'&&o.status==='pending'
        return `<div class="gc"><div class="gci" style="padding:12px 14px"><div class="ginfo"><div class="gtitle" style="font-size:13px">订单 ${o.orderNo}</div><div class="gprice" style="font-size:16px">¥${o.totalPrice||'0.00'}</div><div class="gmeta">状态: <span class="tag ${tc}">${sm[o.status]||o.status}</span>${as?`<span style="margin-left:auto;display:flex;gap:6px"><span class="btn btn-primary" style="padding:6px 14px;font-size:12px;border-radius:8px;width:auto;display:inline-block" onclick="updateOrder(${o.id},'paid')">确认</span><span class="btn btn-outline" style="padding:6px 14px;font-size:12px;border-radius:8px;width:auto;display:inline-block" onclick="updateOrder(${o.id},'cancelled')">拒绝</span></span>`:''}</div></div></div></div>`
      }).join('')
    }else{el.innerHTML='<div class="empty"><div class="ea">📋</div><h3>暂无订单</h3></div>'}
  }catch(e){el.innerHTML='<div class="empty"><div class="ea">😶</div><h3>加载失败</h3></div>'}
}
async function updateOrder(id,s){
  try{const r=await fetch(`${API}/api/order/${id}/status?status=${s}`,{method:'PUT',headers:{'Authorization':'Bearer '+T()}});const d=await r.json();if(d.code===200)renderOrders();else alert('操作失败')}catch(e){alert('网络错误')}
}

  fetch(`${API}/api/goods/mine`,{headers:{'Authorization':'Bearer '+T()}}).then(r=>r.json()).then(d=>{

// ADMIN
function showAdminAuth(){
  fetch(API+'/api/admin/auth/pending?page=0&size=20',{headers:{'Authorization':'Bearer '+T()}})
  .then(function(r){return r.json()})
  .then(function(d){
    if(d.code!==200||!d.data||!d.data.content)return
    if(d.data.content.length===0){
      showModalText('⚙⚙⚙ 审核认证','暂无待审核申请')
      return
    }
    var list=''
    for(var i=0;i<d.data.content.length;i++){
      var a=d.data.content[i]
      list+='<div style=background:var(--ivory);border-radius:12px;padding:14px;margin-bottom:10px>'
      list+='<div style=font-size:14px;font-weight:600>用户 #'+a.userId+'</div>'
      list+='<div style=font-size:13px;color:var(--muted);margin:4px 0>学号: '+a.studentId+' | 姓名: '+a.realName+'</div>'
      if(a.createdAt){list+='<div style=font-size:12px;color:var(--muted)>提交: '+new Date(a.createdAt).toLocaleString('zh-CN')+'</div>'}
      list+='<div style=display:flex;gap:8px;margin-top:8px>'
      list+='<button class=admin-auth-btn data-id='+a.id+' data-approved=true style=flex:1;padding:8px;border:none;border-radius:8px;background:var(--success);color:#fff;font-weight:600;cursor:pointer>✅ 通过</button>'
      list+='<button class=admin-auth-btn data-id='+a.id+' data-approved=false style=flex:1;padding:8px;border:none;border-radius:8px;background:var(--error);color:#fff;font-weight:600;cursor:pointer>❌ 拒绝</button></div></div>'
    }
    list+="<button class=\"btn btn-outline\" onclick=\"closeModal('detailModal')\">关闭</button>" 
    document.getElementById('detailContent').innerHTML='<div class=mi></div><div class=mt>⚙⚙⚙ 审核认证</div><div style=max-height:60vh;overflow-y:auto>'+list
    openModal('detailModal')
    // Add event listeners
    var btns=document.querySelectorAll('.admin-auth-btn')
    for(var j=0;j<btns.length;j++){
      btns[j].addEventListener('click',function(){
        var id=this.getAttribute('data-id')
        var approved=this.getAttribute('data-approved')==='true'
        doReview(id,approved)
      })
    }
  })
}
function doReview(aid,approved){
  var comment=''
  if(!approved){comment=prompt('拒绝原因')||'认证信息不符'}
  if(comment===null)return
  fetch(API+'/api/admin/auth/review?authId='+aid+'&approved='+approved+'&comment='+encodeURIComponent(comment),{method:'POST',headers:{'Authorization':'Bearer '+T()}})
  .then(function(r){return r.json()})
  .then(function(d){
    if(d.code===200){alert('✅ '+d.data);closeModal('detailModal')}
    else{alert('❌ '+d.message)}
  })
}
function showModalText(title,text){
  document.getElementById('detailContent').innerHTML=`<div class=mi></div><div class=mt>${title}</div><div style=padding:30px;text-align:center;color:var(--muted)>${text}</div><button class='btn btn-outline' onclick='closeModal(\"detailModal\")'>关闭</button>`
  openModal('detailModal')
}

    var list=''

      list+='<div style=display:flex;gap:8px;margin-top:8px>'

      list+='<button class=admin-goods-btn data-id='+g.id+' data-approved=false style=flex:1;padding:8px;border:none;border-radius:8px;background:var(--error);color:#fff;font-weight:600;cursor:pointer>❌ 拒绝</button></div></div>'
    }
    list+='<button class="btn btn-outline" onclick="closeModal(\'detailModal\')">关闭</button>'
    document.getElementById('detailContent').innerHTML='<div class=mi></div><div class=mt>📦 审核商品</div><div style=max-height:60vh;overflow-y:auto>'+list

        var id=this.getAttribute('data-id')
        var approved=this.getAttribute('data-approved')==='true'
        doGoodsReview(id,approved)
      })
    }
  })
}
function doGoodsReview(gid,approved){
  fetch(API+'/api/goods/review?goodsId='+gid+'&approved='+approved,{method:'POST',headers:{'Authorization':'Bearer '+T()}})
  .then(function(r){return r.json()})
  .then(function(d){
    if(d.code===200){alert('✅ '+(approved?'已通过审核':'已拒绝'));showAdminGoods()}
    else{alert('❌ '+d.message)}
  })
}
function showAdminDelist(){

      if(g.createdAt)list+='<div style=font-size:11px;color:var(--muted)>发布时间: '+new Date(g.createdAt).toLocaleString('zh-CN')+'</div>'
      list+='<div style=display:flex;gap:8px;margin-top:8px>'

    }

function doDelist(gid){
  fetch(API+'/api/goods/delist?goodsId='+gid,{method:'POST',headers:{'Authorization':'Bearer '+T()}})
  .then(function(r){return r.json()})
  .then(function(d){
    if(d.code===200){alert('✅ '+d.data);showAdminDelist()}
    else{alert('❌ '+(d.message||'失败'))}
  })
}
